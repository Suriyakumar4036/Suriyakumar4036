<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="100%" height="auto">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff416c" />
      <stop offset="50%" stop-color="#ff4b2b" />
      <stop offset="100%" stop-color="#ff8c00" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0e0709" />
      <stop offset="50%" stop-color="#140a0c" />
      <stop offset="100%" stop-color="#080304" />
    </linearGradient>
    <style>
      .title {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        font-weight: 800;
        font-size: 52px;
        fill: url(#textGrad);
        letter-spacing: 5px;
        text-anchor: middle;
      }
      
      .subtitle {
        font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
        font-weight: 500;
        font-size: 18px;
        fill: #a1a1aa;
        text-anchor: middle;
        opacity: 0;
        animation: fadeIn 2s ease-in-out forwards;
        animation-delay: 0.6s;
        letter-spacing: 1px;
      }
      
      .line {
        stroke: url(#textGrad);
        stroke-width: 2.5;
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: drawLine 2s ease-out forwards;
        animation-delay: 0.2s;
      }

      /* Animated grid/nodes */
      .node {
        fill: #ff416c;
        opacity: 0.25;
        animation: pulse 4s ease-in-out infinite;
      }

      .node-delayed {
        fill: #ff8c00;
        opacity: 0.2;
        animation: pulse-delayed 5s ease-in-out infinite;
        animation-delay: 1.5s;
      }

      .wave-path {
        fill: none;
        stroke: rgba(255, 75, 43, 0.05);
        stroke-width: 1.5;
        stroke-dasharray: 1200;
        stroke-dashoffset: 1200;
        animation: drawWave 15s linear infinite;
      }

      @keyframes drawLine {
        to {
          stroke-dashoffset: 0;
        }
      }

      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 0.25; }
        50% { transform: scale(1.3); opacity: 0.6; }
      }

      @keyframes pulse-delayed {
        0%, 100% { transform: scale(1); opacity: 0.2; }
        50% { transform: scale(1.5); opacity: 0.5; }
      }

      @keyframes drawWave {
        0% { stroke-dashoffset: 1200; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGrad)" rx="12" />

  <!-- Animated waves in background -->
  <path class="wave-path" d="M -50 160 Q 150 70 350 160 T 750 160" style="animation-duration: 18s;" />
  <path class="wave-path" d="M 0 110 Q 200 190 400 110 T 800 110" style="animation-duration: 12s;" />

  <!-- Constellation Nodes (Left & Right margins for clean look) -->
  <!-- Left group -->
  <circle class="node" cx="80" cy="60" r="3.5" />
  <circle class="node-delayed" cx="130" cy="160" r="4" />
  <circle class="node" cx="60" cy="130" r="2.5" />
  <line x1="80" y1="60" x2="130" y2="160" stroke="rgba(255, 65, 108, 0.08)" stroke-width="1" />
  <line x1="60" y1="130" x2="130" y2="160" stroke="rgba(255, 140, 0, 0.08)" stroke-width="1" />

  <!-- Right group -->
  <circle class="node" cx="720" cy="60" r="3.5" />
  <circle class="node-delayed" cx="670" cy="160" r="4" />
  <circle class="node" cx="740" cy="130" r="2.5" />
  <line x1="720" y1="60" x2="670" y2="160" stroke="rgba(255, 65, 108, 0.08)" stroke-width="1" />
  <line x1="740" y1="130" x2="670" y2="160" stroke="rgba(255, 140, 0, 0.08)" stroke-width="1" />

  <!-- Centered Content -->
  <g transform="translate(400, 120)">
    <!-- Main Title (Centered) -->
    <text x="0" y="-15" class="title">SURIYA KUMAR R</text>
    
    <!-- Accent Line (Animates from center) -->
    <line x1="-180" y1="10" x2="180" y2="10" class="line" />
    
    <!-- Subtitle (Centered, larger font for mobile readability) -->
    <text x="0" y="42" class="subtitle">Full Stack Developer  •  Software Architect  •  DevOps &amp; Cloud</text>
  </g>
</svg>